<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>bracketball mobile shell</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        padding: 24px;
        background: #f5f7fb;
        color: #0f172a;
      }
      main {
        max-width: 640px;
        margin: 0 auto;
        border: 1px solid #d6d9e0;
        border-radius: 12px;
        background: #fff;
        padding: 20px;
      }
      code {
        background: #eef1f7;
        border-radius: 6px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>bracketball app shell</h1>
      <p>
        This mobile shell is configured to load your hosted Next.js site.
      </p>
      <p>
        Set <code>CAPACITOR_APP_URL</code> to your production URL, then run
        <code>npm run mobile:sync</code>.
      </p>
    </main>
  </body>
</html>
